<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Course page </title>
</head>
<body>
  <div class="nav-overlay"></div>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>Westcoast Education</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div id="auth-links" class="auth-links">
                <!-- Filled by JavaScript -->
            </div>
            <button class="hamburger">☰</button>
        </div>
    </nav>
</header>

<div class="nav-drawer">
    <button class="drawer-close">✕</button>
    <span class="drawer-logo">Westcoast Education</span>
    <div class="drawer-nav-links">
        <a href="index.html">Home</a>
        <a href="#courses">Courses</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
    </div>
    <div id="drawer-auth-links" class="drawer-auth-links"></div>
</div>

    <main>
        <div class="container">
            <h1>Our Courses</h1>
            
            <div class="course-filters">
                <input type="text" id="search-courses" placeholder="Search courses...">
                
                <select id="filter-category">
                    <option value="all">All categories</option>
                    <option value="programming">Programming</option>
                    <option value="webdesign">Web Design</option>
                    <option value="data-science">Data Science</option>
                </select>
                
                <select id="filter-type">
                    <option value="all">All formats</option>
                    <option value="classroom">Classroom</option>
                    <option value="distance">Distance</option>
                    
                </select>
                
                <select id="sort-by">
                    <option value="title">Sort by: Name</option>
                    <option value="price">Sort by: Price</option>
                    <option value="rating">Sort by: Rating</option>
                </select>
            </div>
            
            <div id="message-container"></div>
            <div id="course-list" class="course-grid">
                <!-- Filled by JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Westcoast Education. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
