<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westcoast Education - My Profile</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="nav-overlay"></div>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>Westcoast Education</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div id="auth-links" class="auth-links">
                <!-- Filled by JavaScript -->
            </div>
            <button class="hamburger">☰</button>
        </div>
    </nav>
</header>

<div class="nav-drawer">
    <button class="drawer-close">✕</button>
    <span class="drawer-logo">Westcoast Education</span>
    <div class="drawer-nav-links">
        <a href="index.html">Home</a>
        <a href="#courses">Courses</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
    </div>
    <div id="drawer-auth-links" class="drawer-auth-links"></div>
</div>

    <main>
        <div class="container">
            <h1>My Profile</h1>
            
            <div id="profile-info" class="profile-info">
                <!-- Filled by JavaScript -->
            </div>
            
            <div class="profile-tabs">
                <button class="tab-btn active" data-tab="booked">Booked Courses</button>
                <button class="tab-btn" data-tab="purchased">Purchased Courses</button>
                <button class="tab-btn" data-tab="recommendations">Recommendations</button>
            </div>
            
            <div id="tab-booked" class="tab-content active">
                <h2>My Booked Courses</h2>
                <div id="booked-courses" class="course-grid">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <div id="tab-purchased" class="tab-content">
                <h2>My Purchased Courses</h2>
                <div id="purchased-courses" class="course-grid">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
            
            <div id="tab-recommendations" class="tab-content">
                <h2>Recommended for You</h2>
                <div id="recommended-courses" class="course-grid">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Westcoast Education. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
